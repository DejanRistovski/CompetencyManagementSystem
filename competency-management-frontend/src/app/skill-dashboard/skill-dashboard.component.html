<div class="container">
  <div class="mt-3">
    <div class="d-flex justify-content-between align-items-center">
      <h1 class="mb-0">Skills Dashboard</h1>
      <div>
        <button *ngIf="!isGeneratingJobPosting" mat-stroked-button class="primary-font mr-2"
                (click)="onGenerateJobPosting()">Generate Job Posting</button>
        <button mat-flat-button class="primary-background text-white" (click)="onExtractSkills()">Extract Skills</button>
      </div>
    </div>
    <div class="row mt-3" *ngIf="isGeneratingJobPosting">
      <div class="d-flex flex-wrap col-9" style="width: 60%">
        <div *ngFor="let level of selectedLevels" class="chip mr-2 mt-2">
          {{level.fromSkill?.name}} <span class="chip-dot">·</span> {{level.name}}
        </div>
        <span *ngIf="selectedLevels.length === 0" class="font-italic">No selected levels</span>
      </div>
      <div class="col-3 d-flex justify-content-end">
        <mat-spinner *ngIf="isLoading" class="ml-auto mr-2" diameter="30"></mat-spinner>
        <button mat-stroked-button class="red-font" (click)="onGenerateDiscard()">Discard</button>
        <button mat-stroked-button class="primary-font ml-2" (click)="onGenerateConfirm()">Generate</button>
      </div>
    </div>
    <div class="row mt-2">
      <div class="col-4 p-3" *ngFor="let skill of skills">
        <app-skill-card [skill]="skill"
                        (skillSelected)="isGeneratingJobPosting ? onAddLevel($event) : onSkillDetails(skill)">
        </app-skill-card>
      </div>
    </div>
  </div>
</div>

<ng-template #skillDetailsDrawer let-skill="skill">
  <app-skill-drawer [skill]="skill"></app-skill-drawer>
</ng-template>
