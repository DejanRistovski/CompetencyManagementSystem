<app-spinner-loader>
  <div class="d-flex justify-content-center align-items-center main-background" style="height: calc(100vh - 80px)">
    <mat-card class="p-4 py-5">
      <div class="text-center mb-5" style="font-size: 3rem">Register</div>
      <form [formGroup]="signUpForm">
        <div class="row">
          <mat-form-field appearance="outline" class="col-6 pr-1">
            <mat-label>First Name</mat-label>
            <input type="firstName" matInput placeholder="Jane" formControlName="firstName">
          </mat-form-field>
          <mat-form-field appearance="outline" class="col-6 pl-1">
            <mat-label>Last Name</mat-label>
            <input type="lastName" matInput placeholder="Doe" formControlName="lastName">
          </mat-form-field>
        </div>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Email</mat-label>
          <input type="email" matInput placeholder="mail@example.com" formControlName="email">
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Password</mat-label>
          <input type="password" matInput placeholder="Password" formControlName="password">
          <button matSuffix mat-icon-button aria-label="Clear">
            <mat-icon>lock</mat-icon>
          </button>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Repeat Password</mat-label>
          <input type="password" matInput placeholder="Repeat Password" formControlName="repeatPassword">
          <button matSuffix mat-icon-button>
            <mat-icon>lock</mat-icon>
          </button>
        </mat-form-field>
        <button mat-flat-button color="primary" class="w-100 p-1" (click)="register()">Register</button>
        <div class="mt-3 text-center">Already have an account? <a mat-button color="primary"
                                                                  routerLink="/login">Login!</a></div>
      </form>
    </mat-card>
  </div>
</app-spinner-loader>
