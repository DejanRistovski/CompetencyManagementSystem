<app-spinner-loader>
  <div class="d-flex justify-content-center align-items-center main-background" style="height: calc(100vh - 80px)">
    <mat-card class="p-4 py-5">
      <div class="text-center mb-5" style="font-size: 3rem">Login</div>
      <form [formGroup]="loginForm">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Email</mat-label>
          <input type="email" matInput placeholder="Ex. pat@example.com" formControlName="email">
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Password</mat-label>
          <input type="password" matInput placeholder="Password" formControlName="password">
          <button matSuffix mat-icon-button aria-label="Clear">
            <mat-icon>lock</mat-icon>
          </button>
        </mat-form-field>
        <button mat-flat-button color="primary" class="w-100 p-1" (click)="login()">Login</button>
        <div class="mt-3 text-center">Don't have an account? <a mat-button color="primary" routerLink="/register">Sign
          Up!</a></div>
      </form>
    </mat-card>
  </div>
</app-spinner-loader>
