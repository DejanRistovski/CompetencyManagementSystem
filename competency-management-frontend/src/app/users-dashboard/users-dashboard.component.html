<div class="container">
  <h1 class="mt-3 font-weight-bolder">Users</h1>
  <mat-card class="d-flex justify-content-start align-items-center my-3" *ngFor="let user of users">
    <div style="width: 35%" class="d-flex justify-content-start">
      <div class="profile-picture rounded-circle p-3 primary-faded-background primary-border primary-font m-3">
        <h1 class="m-0 font-weight-bolder">{{ (user?.firstName?.[0] ?? '') + (user?.lastName?.[0] ?? '') }}</h1>
      </div>
      <div class="my-3">
        <h2 class="font-weight-bold m-0">{{user?.firstName}} {{user?.lastName}}</h2>
        <div class="font-weight-lighter">{{user?.jobTitle}}</div>
      </div>
    </div>
    <div class="divider mr-5"></div>
    <div class="d-flex flex-wrap" style="width: 60%">
      <div *ngFor="let skill of user.skills" class="chip mr-2 mt-2">
        {{skill.skill.name}} <span class="chip-dot">·</span> {{getMatchedLevel(skill.skill)?.name}}
      </div>
    </div>
    <div class="divider mx-3"></div>
    <div style="width: 5%" class="mx-3 ">
      <button mat-icon-button (click)="onEditUser(user.id)"><mat-icon>edit</mat-icon></button>
    </div>
  </mat-card>
</div>
