<div class="m-3">
  <h3>Assign skills</h3>
  <mat-form-field appearance="outline" class="w-100">
    <mat-label>Skill</mat-label>
    <mat-select [(ngModel)]="selectedSkill">
      <mat-option *ngFor="let skill of skills" [value]="skill" [disabled]="existsSkill(skill)">{{ skill.name }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <div class="d-flex flex-column gap-2 mb-2" *ngFor="let level of selectedSkill?.levels" (click)="onSelectLevel(level)">
    <div class="card level-card rounded-3 p-0" data-value="beginner">
      <div class="card-body d-flex align-items-start gap-3 p-3">
        <div class="level-num primary-faded-background mr-3">{{ level.levelOrder }}</div>
        <div class="flex-fill">
          <div class="fw-semibold small mb-1">{{ level.name }}</div>
          <div class="text-muted" style="font-size:.78rem;line-height:1.55;">
            {{ level.expectation }}
          </div>
        </div>
        <span class="material-icons text-muted level-check-icon"
              style="font-size:20px;opacity:0;transition:opacity .15s;">check_circle</span>
      </div>
    </div>
  </div>

  <div>
    <div>Assigned skills</div>
    <div class="d-flex flex-wrap mt-1">
      <div class="rounded-pill primary-faded-background px-2 py-1 mr-2 mt-2"
           style="border: 1px solid lightgray"
           *ngFor="let level of selectedLevels">
        {{ level.fromSkill?.name }} - {{ level.name }}
        <button mat-icon-button (click)="onRemoveLevel(level)"
                style="width: 16px; height: 16px; line-height: 16px; margin-left: 4px;">
          <mat-icon style="font-size: 16px; line-height: 16px; width: 16px; height: 16px;">cancel</mat-icon>
        </button>
      </div>
      <div class="font-weight-lighter" style="font-size: 12px" *ngIf="selectedLevels.length === 0">No Skills Selected
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-end mt-3">
    <div class="ml-2">
      <button mat-flat-button class="primary-background text-white d-flex align-items-center" (click)="saveSkills()">
        Save
      </button>
    </div>
  </div>

</div>
