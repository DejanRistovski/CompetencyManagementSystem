<div class="main-sidebar">
  <div class="d-flex py-3 justify-content-between mb-0 mx-auto" style="width: 70vw">
    <h1 class="p-2 m-0 text-white">Skill Management System</h1>
    <div class="d-flex align-items-center">
      <mat-selection-list #selectionList [multiple]="false" class="d-flex p-0 align-items-center"
                          (selectionChange)="onSelectionChange($event)">
        <mat-list-option value="my-profile" *ngIf="authService.isLoggedIn">My Profile</mat-list-option>
        <mat-list-option value="users-dashboard" *ngIf="authService.isLoggedIn">Users</mat-list-option>
        <mat-list-option value="skill-dashboard" *ngIf="authService.isLoggedIn && authService.isManager">Skills</mat-list-option>
        <mat-list-option value="job-postings">Job Postings</mat-list-option>
      </mat-selection-list>
      <div class="nav-divider ml-4 mr-3"></div>
      <ng-container *ngIf="!authService.isLoggedIn">
        <button class="btn-ghost" (click)="onLogin()">Log in</button>
        <button class="btn-primary ml-3" (click)="onRegister()">Register</button>
      </ng-container>

      <ng-container *ngIf="authService.isLoggedIn">
        <span class="nav-username">
          <span class="avatar" id="avatarInitials">{{ (authService.currentUser?.firstName?.[0] ?? '') + (authService.currentUser?.lastName?.[0] ?? '') }}</span>
          <span id="displayName">{{authService.currentUser?.firstName}} {{authService.currentUser?.lastName}}</span>
        </span>
        <div>
          <button class="btn-ghost" (click)="onLogout()">Log out</button>
        </div>
      </ng-container>
    </div>
  </div>
</div>
