<div class="container">
  <div class="mt-3 d-flex justify-content-between">
    <h2 class="font-weight-bolder">{{title}}</h2>
    <div class="d-flex" *ngIf="authService.isManager">
      <div>
        <button mat-stroked-button class="primary-border primary-font d-flex align-items-center"
                (click)="document.getElementById('cvInput')!.click()">
          <mat-icon style="font-size: 16px; width: 16px; height: 16px">upload</mat-icon>
          Import CV
        </button>
        <input type="file" id="cvInput" accept=".pdf,.doc,.docx" style="display:none" (change)="onFileSelected($event)">
      </div>
      <div class="ml-2">
        <button mat-stroked-button class="primary-border primary-font d-flex align-items-center"
                (click)="onAssignSkills()">
          <mat-icon style="font-size: 16px; width: 16px; height: 16px">add</mat-icon>
          Assign Skills
        </button>
      </div>
    </div>
  </div>
  <div class="my-3">
    <app-user-info [user]="user"></app-user-info>
  </div>
  <div class="d-flex justify-content-between">
    <div class="d-flex">
      <h3 class="font-weight-bolder m-0">Skills</h3>
    </div>
    <div *ngIf="uploadedCV" class="d-flex">
      <mat-spinner *ngIf="isLoading" class="ml-auto mr-2" diameter="30"></mat-spinner>
      <div style="background: #F4F5F7; border: 1px solid #8A8FA8; font-size: 12px;"
           class="rounded-pill p-2 mr-2">{{uploadedCV.name}}</div>
      <button style="font-size: 12px" class="primary-background rounded-pill border-0 text-white px-3"
              (click)="onExtractFromPDF()">
        <mat-icon style="width: 12px; height: 11px; font-size: 12px">open_in_new</mat-icon>
        Extract
      </button>
    </div>
  </div>
  <div class="row">
    <div class="col-4 p-3" *ngFor="let skill of userSkillsFiltered">
      <app-skill-card [style]="getCardStyle(skill)"
                      [buttonData]="getButtonData(skill)"
                      [badgeData]="getBadgeData(skill)"
                      [skill]="skill"
                      (buttonClicked)="onSkillCardButtonClick($event, skill)"
                      (skillSelected)="onSkillDetails(skill)"></app-skill-card>
    </div>
  </div>

  <div *ngIf="generatedSkills.length">
    <div class="d-flex">
      <h3 class="font-weight-bolder m-0">Additional Skills</h3>
    </div>
    <div class="row">
      <div class="col-4 p-3" *ngFor="let skill of additionalSkillsFiltered">
        <app-skill-card [style]="getCardStyle(skill)"
                        [badgeData]="getBadgeData(skill)"
                        [buttonData]="getButtonData(skill)"
                        [skill]="skill"
                        (buttonClicked)="onSkillCardButtonClick($event, skill)"
                        (skillSelected)="onSkillDetails(skill)"></app-skill-card>
      </div>
    </div>
  </div>
</div>

<ng-template #skillDetailsDrawer let-skill="skill">
  <app-skill-drawer [style]="getCardStyle(skill)"
                    [badgeData]="getBadgeData(skill)"
                    [skill]="skill"></app-skill-drawer>
</ng-template>

<ng-template #assignSkillsDrawer>
  <app-user-skills-manage [user]="user" (onSaveSkills)="onSaveSkills($event)"></app-user-skills-manage>
</ng-template>
